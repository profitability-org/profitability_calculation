server:
  port: 8080
spring:
  application:
    name: gateway-service
  config:
    import:
      - "optional:classpath:open-endpoints.yaml"
      - "optional:classpath:routes.yaml"
      - "optional:classpath:eureka-client.yaml"
      - "optional:classpath:spring-doc.yaml"
management:
  endpoints:
    web:
      exposure:
        include: "gateway,health,info"
  endpoint:
    gateway:
      enabled: true
