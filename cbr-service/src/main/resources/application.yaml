server:
  port: 8083

spring:
  application:
    name: cbr-service
  config:
    import:
      - "optional:classpath:eureka-client.yaml"
      - "optional:classpath:grpc-client.yaml"
      - "optional:classpath:spring-doc.yaml"
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/profitability_cbr}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  grpc:
    server:
      port: 9092
